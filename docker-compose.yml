services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: jobmarket
      POSTGRES_USER: jobmarket
      POSTGRES_PASSWORD: jobmarket
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U jobmarket']
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://jobmarket:jobmarket@db:5432/jobmarket
      DJANGO_DEBUG: 'false'
      DJANGO_SECRET_KEY: dev-compose-secret-change-me
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,backend
      CORS_ALLOWED_ORIGINS: http://localhost:3000
      SECURE_SSL_REDIRECT: 'false'
    ports:
      - '8000:8000'
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
